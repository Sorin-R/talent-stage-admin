name: Deploy Admin to Hostinger
# noop: keep this comment to allow explicit retrigger via workflow-file commit

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/**
      - public/**
      - index.html
      - package.json
      - package-lock.json
      - vite.config.ts
      - tsconfig.json
      - tsconfig.app.json
      - tsconfig.node.json
      - .github/workflows/deploy-admin-hostinger.yml

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build admin app
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          set -euo pipefail
          export VITE_API_URL="${VITE_API_URL:-https://api.web-demo.space/api/admin}"
          npm run build

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          : "${SSH_PRIVATE_KEY:?Missing secret SSH_PRIVATE_KEY}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy dist to Hostinger
        env:
          SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER || vars.SSH_USER }}
          ADMIN_DEPLOY_PATH: ${{ secrets.ADMIN_DEPLOY_PATH || vars.ADMIN_DEPLOY_PATH }}
        run: |
          set -euo pipefail

          clean_one_line() {
            printf '%s' "$1" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          }

          SSH_HOST="$(clean_one_line "${SSH_HOST:-89.116.105.105}")"
          SSH_PORT="$(clean_one_line "${SSH_PORT:-65002}")"
          SSH_USER="$(clean_one_line "${SSH_USER:-u428592730}")"
          ADMIN_DEPLOY_PATH="$(clean_one_line "${ADMIN_DEPLOY_PATH:-/home/u428592730/domains/admin.web-demo.space/public_html}")"

          : "${SSH_HOST:?Missing SSH_HOST (secret or variable)}"
          : "${SSH_PORT:?Missing SSH_PORT (secret or variable)}"
          : "${SSH_USER:?Missing SSH_USER (secret or variable)}"
          : "${ADMIN_DEPLOY_PATH:?Missing ADMIN_DEPLOY_PATH (secret or variable)}"

          SSH_OPTS="-i ~/.ssh/id_ed25519 -p $SSH_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=2"

          for attempt in 1 2 3; do
            if ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "mkdir -p '$ADMIN_DEPLOY_PATH'"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "SSH mkdir failed after 3 attempts"
              exit 1
            fi
            sleep $((attempt * 2))
          done

          for attempt in 1 2 3; do
            if rsync -az --delete \
              -e "ssh $SSH_OPTS" \
              dist/ "$SSH_USER@$SSH_HOST:$ADMIN_DEPLOY_PATH/"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "rsync deploy failed after 3 attempts"
              exit 1
            fi
            sleep $((attempt * 2))
          done
